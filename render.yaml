services:
  - type: web
    name: galeria-pintor
    env: node
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: SESSION_SECRET
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: galeria-pintor-db
          property: connectionString

      - key: ADMIN_USER
        value: admin

      - key: ADMIN_PASSWORD
        sync: false

      - key: ADMIN_NAME
        value: Administrador

      - key: WHATSAPP_PHONE
        sync: false

databases:
  - name: galeria-pintor-db